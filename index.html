<script>
    const card = document.getElementById('card');
    const bg = document.getElementById('bg-container');
    const mainContainer = document.getElementById('main-site'); // Referencia al contenedor principal
    let mouseX = 0, mouseY = 0;
    let isStarted = false;

    // ... (tu función start() se mantiene igual)

    window.addEventListener('mousemove', (e) => {
        // Normalizamos el valor de -1 a 1
        mouseX = (e.clientX / window.innerWidth) * 2 - 1;
        mouseY = (e.clientY / window.innerHeight) * 2 - 1;
    });

    function updateParallax() {
        if (!isStarted) return;

        // 1. Movimiento del fondo (suave)
        const bgX = mouseX * -20; 
        const bgY = mouseY * -20;
        bg.style.transform = `translate(${bgX}px, ${bgY}px) scale(1.1)`;

        // 2. Efecto de inclinación de TODO el sitio (lo que pediste)
        // Esto hace que la página completa se incline ligeramente hacia el mouse
        const tiltX = mouseY * 5;  // Inclinación vertical
        const tiltY = mouseX * -5; // Inclinación horizontal
        document.body.style.transform = `rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
        document.body.style.transition = "transform 0.1s ease-out";

        // 3. La tarjeta se mueve un poco más para dar profundidad extra
        const cardX = mouseX * 20;
        const cardY = mouseY * 20;
        card.style.transform = `translate(${cardX}px, ${cardY}px)`;

        requestAnimationFrame(updateParallax);
    }
</script>
